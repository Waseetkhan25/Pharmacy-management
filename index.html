<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>💊 Pharmacy Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
    h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
    .container { max-width: 900px; margin: auto; }
    .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { color: #2980b9; margin-bottom: 15px; }
    input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    button { width: 100%; padding: 12px; background: #2980b9; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    button:hover { background: #1a6fa8; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #2980b9; color: white; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    tr:hover { background: #f9f9f9; }
    .delete-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    .msg { text-align: center; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h1>💊 Pharmacy Management System</h1>
  <div class="container">

    <!-- Add Medicine Form -->
    <div class="card">
      <h2>➕ Add Medicine</h2>
      <div id="msg"></div>
      <input type="text" id="name" placeholder="Medicine Name (e.g. Panadol)" />
      <select id="category">
        <option value="">Select Category</option>
        <option value="Tablet">Tablet</option>
        <option value="Syrup">Syrup</option>
        <option value="Injection">Injection</option>
        <option value="Capsule">Capsule</option>
        <option value="Cream">Cream</option>
      </select>
      <input type="number" id="quantity" placeholder="Quantity (e.g. 100)" />
      <input type="number" id="price" placeholder="Price (e.g. 50)" />
      <input type="date" id="expiryDate" />
      <button onclick="addMedicine()">Add Medicine</button>
    </div>

    <!-- Medicine List -->
    <div class="card">
      <h2>📋 All Medicines</h2>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Expiry Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="medicineList">
          <tr><td colspan="6" style="text-align:center">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script>
    const API = 'http://localhost:8080/api/medicines';

    // Load all medicines
    async function loadMedicines() {
      const res = await fetch(API);
      const data = await res.json();
      const tbody = document.getElementById('medicineList');
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No medicines found</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(m => `
        <tr>
          <td>${m.name}</td>
          <td>${m.category}</td>
          <td>${m.quantity}</td>
          <td>Rs. ${m.price}</td>
          <td>${new Date(m.expiryDate).toLocaleDateString()}</td>
          <td><button class="delete-btn" onclick="deleteMedicine('${m._id}')">Delete</button></td>
        </tr>
      `).join('');
    }

    // Add medicine
    async function addMedicine() {
      const name = document.getElementById('name').value;
      const category = document.getElementById('category').value;
      const quantity = document.getElementById('quantity').value;
      const price = document.getElementById('price').value;
      const expiryDate = document.getElementById('expiryDate').value;

      if (!name || !category || !quantity || !price || !expiryDate) {
        showMsg('Please fill all fields!', 'error');
        return;
      }

      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, category, quantity, price, expiryDate })
      });

      if (res.ok) {
        showMsg('Medicine added successfully!', 'success');
        document.getElementById('name').value = '';
        document.getElementById('category').value = '';
        document.getElementById('quantity').value = '';
        document.getElementById('price').value = '';
        document.getElementById('expiryDate').value = '';
        loadMedicines();
      } else {
        showMsg('Error adding medicine!', 'error');
      }
    }

    // Delete medicine
    async function deleteMedicine(id) {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      showMsg('Medicine deleted!', 'success');
      loadMedicines();
    }

    function showMsg(text, type) {
      const msg = document.getElementById('msg');
      msg.className = `msg ${type}`;
      msg.textContent = text;
      setTimeout(() => msg.textContent = '', 3000);
    }

    loadMedicines();
  </script>
</body>
</html>

version: '3.8'

services:

  web:
    build: .
    ports:
      - "8080:5000"
    environment:
      - MONGODB_URI=mongodb://database:27017/pharmacy-management
      - JWT_SECRET=pharmacy_secret_key_123
      - PORT=5000
    depends_on:
      - database

  database:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
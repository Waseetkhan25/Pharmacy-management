name: CI/CD Pipeline — Pharmacy Management System

on:
  push:
    branches: [ "main" ]

jobs:

  test:
    name: Install & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/pharmacy-management:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/pharmacy-management:${{ github.sha }} \
            .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pharmacy-management:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pharmacy-management:${{ github.sha }}

      - name: Success Summary
        run: |
          echo "✅ Pipeline complete!"
          echo "📦 Image: ${{ secrets.DOCKERHUB_USERNAME }}/pharmacy-management:latest"
          echo "🔖 Commit: ${{ github.sha }}"
name: CI/CD Pipeline — Pharmacy Management System

# ─────────────────────────────────────────────
# TRIGGER: Jab bhi main branch pe push ho
# ─────────────────────────────────────────────
on:
  push:
    branches: [ "main" ]

jobs:

  # ══════════════════════════════════════════
  # JOB 1: Tests chalao
  # Agar test fail ho → Docker wala job NAHI chalega
  # ══════════════════════════════════════════
  test:
    name: 🧪 Install & Run Tests
    runs-on: ubuntu-latest

    steps:
      # GitHub server pe hamara code download karo
      - name: Checkout Code
        uses: actions/checkout@v4

      # Node.js version 20 install karo
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # npm install — sari libraries install ho
      - name: Install Dependencies
        run: npm install

      # Vitest se tests chalao
      - name: Run Tests
        run: npm test

  # ══════════════════════════════════════════
  # JOB 2: Docker image banao aur push karo
  # Sirf tab chalega jab JOB 1 pass ho ✅
  # ══════════════════════════════════════════
  docker:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test               # JOB 1 pass hona zaroori hai

    steps:
      # Code dobara download karo (naya runner hai)
      - name: Checkout Code
        uses: actions/checkout@v4

      # Docker Hub pe login karo (GitHub Secrets se)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker image build karo — do tags lagao:
      # :latest      → hamesha latest wali
      # :commit-sha  → exactly kaunsi commit thi track karne ke liye
      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/pharmacy-management:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/pharmacy-management:${{ github.sha }} \
            .

      # Dono tags Docker Hub pe push karo
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pharmacy-management:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pharmacy-management:${{ github.sha }}

      # Success message print karo
      - name: Success Summary
        run: |
          echo "✅ Pipeline complete!"
          echo "📦 Image: ${{ secrets.DOCKERHUB_USERNAME }}/pharmacy-management:latest"
          echo "🔖 Commit: ${{ github.sha }}" 
